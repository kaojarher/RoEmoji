<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ragnarok: Prontera Market Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <script src="https://js.puter.com/v2/"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js" async defer></script>
    <style>
        :root {
            --panel-bg: rgba(215, 230, 250, 0.95);
            --panel-border: #4a6d96;
            --panel-text: #1a2a3c;
            --bar-bg: #9baab8;
            --accent-gold: #d4a017;
            --accent-red: #c0392b;
            --accent-blue: #2471a3;
            --accent-green: #1e8449;
            --shadow: 0 3px 12px rgba(0,0,0,0.5);
        }

        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; background-color: #000; overflow: hidden; font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif; user-select: none; touch-action: none; }
        #game-container { width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
        
        /* ===== 核心面板樣式 ===== */
        .ro-panel {
            position: absolute;
            background: var(--panel-bg);
            border: 2px solid var(--panel-border);
            border-radius: 6px;
            color: var(--panel-text);
            font-size: 12px;
            box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,0.6);
            padding: 8px 10px;
            backdrop-filter: blur(4px);
        }
        .ro-panel-title {
            font-weight: bold;
            font-size: 13px;
            border-bottom: 1px solid var(--panel-border);
            padding-bottom: 4px;
            margin-bottom: 6px;
            color: #0d1f33;
            letter-spacing: 0.5px;
        }

        /* ===== 狀態欄 ===== */
        #status-window { top: 10px; left: 10px; width: 200px; }
        #job-title { font-weight: bold; font-size: 13px; margin-bottom: 5px; }
        .ro-bar { height: 10px; background: var(--bar-bg); border-radius: 4px; margin: 3px 0 1px; overflow: hidden; border: 1px solid rgba(0,0,0,0.2); }
        .ro-bar-fill { height: 100%; border-radius: 3px; transition: width 0.3s ease; }
        .ro-hp-fill { background: linear-gradient(90deg, #c0392b, #e74c3c); }
        .ro-sp-fill { background: linear-gradient(90deg, #1a6fa8, #3498db); }
        .ro-exp-fill { background: linear-gradient(90deg, #6c3483, #9b59b6); width: 0%; }
        .bar-label { display: flex; justify-content: space-between; font-size: 10px; color: #2c3e50; margin-bottom: 1px; }
        .zeny-row { margin-top: 6px; font-weight: bold; color: #8b5e00; font-size: 12px; background: rgba(255,215,0,0.2); border-radius: 4px; padding: 3px 5px; border: 1px solid rgba(200,160,0,0.3); }

        /* ===== 素質配點 ===== */
        #stat-window { top: 10px; right: 10px; width: 168px; }
        .stat-row { display: flex; justify-content: space-between; align-items: center; margin: 3px 0; font-size: 11px; }
        .stat-btn { background: linear-gradient(135deg, #5b7da3, #3a5f82); color: white; border: none; border-radius: 3px; width: 20px; height: 20px; cursor: pointer; font-weight: bold; font-size: 13px; line-height: 1; transition: transform 0.1s; }
        .stat-btn:active { transform: scale(0.9); background: linear-gradient(135deg, #e67e22, #d35400); }

        /* ===== 背包 ===== */
        #inventory-window { top: 185px; right: 10px; width: 172px; }
        .inv-slot { background: rgba(255,255,255,0.65); border: 1px dashed var(--panel-border); padding: 4px 6px; margin: 3px 0; border-radius: 4px; font-size: 11px; display: flex; justify-content: space-between; align-items: center; }
        .use-btn { color: white; border: none; padding: 3px 7px; border-radius: 3px; cursor: pointer; font-size: 10px; font-weight: bold; transition: transform 0.1s, filter 0.1s; }
        .use-btn:active { transform: scale(0.9); filter: brightness(0.85); }
        .use-btn-blue { background: linear-gradient(135deg, #2980b9, #1a6fa8); }
        .use-btn-red { background: linear-gradient(135deg, #c0392b, #96281b); }

        /* ===== 商店 ===== */
        #shop-window { top: 50%; left: 50%; transform: translate(-50%, -50%); width: 300px; display: none; z-index: 200; }
        .shop-row { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.7); padding: 7px 8px; margin: 5px 0; border-radius: 5px; border: 1px solid #c5d3e0; }
        .shop-item-name { font-size: 11px; flex: 1; }
        .shop-btn { color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 11px; white-space: nowrap; transition: transform 0.1s, filter 0.1s; }
        .shop-btn:active { transform: scale(0.93); filter: brightness(0.85); }
        .shop-btn-buy { background: linear-gradient(135deg, #e67e22, #ca6f1e); }
        .shop-btn-sell { background: linear-gradient(135deg, #2980b9, #1f6ea8); }
        .shop-close-btn { background: linear-gradient(135deg, #e74c3c, #c0392b); color: white; border: none; padding: 3px 8px; border-radius: 4px; cursor: pointer; font-weight: bold; }

        /* ===== 技能欄 ===== */
        #skill-window { bottom: 10px; right: 10px; width: 160px; }
        .skill-btn { display: flex; justify-content: space-between; align-items: center; background: linear-gradient(135deg, #2c3e50, #34495e); color: white; border: 1px solid #5b7da3; padding: 7px 8px; margin: 4px 0; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 12px; transition: all 0.15s; }
        .skill-btn:hover { background: linear-gradient(135deg, #34495e, #4a6278); }
        .skill-btn:active { background: linear-gradient(135deg, #c0392b, #922b21); transform: scale(0.97); }
        .skill-sp-cost { font-size: 10px; color: #85c1e9; }

        /* ===== 存檔欄 ===== */
        #save-window { top: 330px; right: 10px; width: 172px; }
        .save-btn { width: 100%; background: linear-gradient(135deg, #5b7da3, #4a6b90); color: white; border: 1px solid #34495e; padding: 5px 0; margin: 3px 0; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 11px; transition: filter 0.15s; }
        .save-btn:hover { filter: brightness(1.15); }
        .save-btn.gdrive { background: linear-gradient(135deg, #27ae60, #1e8449); }

        /* ===== 聊天室 ===== */
        #chat-window { bottom: 10px; left: 10px; width: 290px; height: 115px; display: flex; flex-direction: column; padding: 6px; }
        #chat-log { flex: 1; overflow-y: auto; font-size: 11px; margin-bottom: 4px; background: rgba(255,255,255,0.5); padding: 4px; border-radius: 3px; line-height: 1.4; }
        #chat-input { border: 1px solid var(--panel-border); border-radius: 3px; padding: 4px 6px; font-size: 11px; outline: none; background: rgba(255,255,255,0.8); }

        /* ===== 行動端搖桿 ===== */
        .mobile-ui { position: absolute; bottom: 20px; width: 100%; display: flex; justify-content: space-between; align-items: flex-end; padding: 0 20px; pointer-events: none; }
        .joystick-zone { width: 110px; height: 110px; background: rgba(30, 80, 140, 0.3); border: 2.5px solid rgba(150, 200, 255, 0.7); border-radius: 50%; position: relative; pointer-events: auto; box-shadow: 0 0 20px rgba(100,160,255,0.3); }
        .joystick-stick { width: 44px; height: 44px; background: radial-gradient(circle at 35% 35%, #7fb3e0, #3a7bbf); border-radius: 50%; position: absolute; top: 33px; left: 33px; box-shadow: 0 2px 8px rgba(0,0,0,0.4); transition: transform 0.05s; }
        .mobile-action-buttons { display: flex; flex-direction: column; gap: 8px; pointer-events: auto; }
        .mobile-action-btn { width: 64px; height: 64px; border-radius: 50%; border: 2.5px solid rgba(255,255,255,0.6); color: white; font-size: 11px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-direction: column; transition: transform 0.1s, filter 0.1s; box-shadow: 0 3px 10px rgba(0,0,0,0.4); text-align: center; line-height: 1.2; }
        .mobile-action-btn:active { transform: scale(0.91); filter: brightness(0.85); }
        .btn-skill { background: radial-gradient(circle at 35% 35%, #c0392b, #922b21); }
        .btn-hp-pot { background: radial-gradient(circle at 35% 35%, #e74c3c, #c0392b); }
        .btn-sp-pot { background: radial-gradient(circle at 35% 35%, #2980b9, #1a6fa8); }

        /* ===== 音效提示 ===== */
        #sfx-indicator { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.6); color: #aed6f1; border: 1px solid #5b7da3; border-radius: 20px; padding: 3px 12px; font-size: 11px; opacity: 0; pointer-events: none; transition: opacity 0.3s; }

        /* ===================================
           📱 手機介面 (≤ 600px)
           =================================== */
        @media (max-width: 600px) {
            .ro-panel { font-size: 11px; padding: 6px 8px; }

            /* 狀態欄：頂部橫條 */
            #status-window {
                top: 0; left: 0; right: 0; width: 100%;
                border-radius: 0; border-left: none; border-right: none; border-top: none;
                display: flex; flex-direction: row; gap: 8px; align-items: center; padding: 5px 10px;
                z-index: 100; flex-wrap: wrap;
            }
            #job-title { font-size: 11px; white-space: nowrap; margin-bottom: 0; flex-shrink: 0; }
            .bar-group { flex: 1; min-width: 70px; }
            .bar-label { font-size: 9px; }
            .ro-bar { height: 8px; margin: 1px 0; }
            .zeny-row { font-size: 10px; padding: 2px 4px; white-space: nowrap; }

            /* 素質：隱藏 */
            #stat-window { display: none; }

            /* 存檔：改為右下角浮動小面板 */
            #save-window {
                display: block;
                top: auto; bottom: 175px; left: 8px; right: auto;
                width: 148px; padding: 5px 7px;
                z-index: 150;
            }
            #save-window .ro-panel-title { font-size: 11px; padding-bottom: 3px; margin-bottom: 4px; }
            #save-window .save-btn { font-size: 10px; padding: 6px 0; margin: 3px 0; min-height: 34px; }

            /* 背包：右側緊湊 */
            #inventory-window {
                top: auto; bottom: 175px; right: 8px;
                width: 150px; padding: 5px 7px;
            }
            .inv-slot { padding: 3px 5px; font-size: 10px; }
            .use-btn { font-size: 9px; padding: 2px 5px; }

            /* 技能欄：隱藏（改用行動按鈕） */
            #skill-window { display: none; }

            /* 聊天室：底部橫條 */
            #chat-window {
                bottom: 0; left: 0; width: 60%; height: 80px;
                border-radius: 0; border-left: none; border-bottom: none; border-right: none;
                padding: 4px 6px;
            }
            #chat-log { font-size: 10px; }
            #chat-input { font-size: 10px; padding: 2px 4px; }

            /* 搖桿與按鈕 */
            .mobile-ui { bottom: 85px; padding: 0 12px; }
            .joystick-zone { width: 100px; height: 100px; }
            .joystick-stick { width: 38px; height: 38px; top: 31px; left: 31px; }
            .mobile-action-buttons { gap: 6px; }
            .mobile-action-btn { width: 58px; height: 58px; font-size: 10px; }

            /* 商店：全寬 */
            #shop-window { width: 95vw; top: 50%; left: 50%; transform: translate(-50%, -50%); }
            .shop-row { padding: 6px; }
            .shop-btn { padding: 6px 8px; font-size: 11px; }
        }

        /* ===================================
           📟 平板介面 (601px ~ 1024px)
           =================================== */
        @media (min-width: 601px) and (max-width: 1024px) {
            .ro-panel { font-size: 12px; }

            /* 狀態欄：頂部橫條，更寬鬆 */
            #status-window {
                top: 0; left: 0; right: 0; width: 100%;
                border-radius: 0; border-left: none; border-right: none; border-top: none;
                display: flex; flex-direction: row; gap: 14px; align-items: center; padding: 6px 14px;
                z-index: 100;
            }
            #job-title { font-size: 13px; white-space: nowrap; margin-bottom: 0; flex-shrink: 0; }
            .bar-group { flex: 1; }
            .ro-bar { height: 9px; }
            .zeny-row { font-size: 12px; white-space: nowrap; }

            /* 素質配點：放置左側 */
            #stat-window { top: auto; bottom: 200px; left: 10px; right: auto; width: 175px; }
            .stat-btn { width: 24px; height: 24px; font-size: 14px; }

            /* 存檔：隱藏（平板用手機模式存不太好操作，可開啟） */
            #save-window { top: auto; bottom: 10px; left: 10px; right: auto; width: 175px; }

            /* 背包：右側正常 */
            #inventory-window { top: 60px; right: 12px; width: 180px; }
            .inv-slot { padding: 5px 7px; }
            .use-btn { font-size: 11px; padding: 4px 8px; }

            /* 技能欄：右下角 */
            #skill-window { bottom: 175px; right: 12px; width: 175px; }
            .skill-btn { padding: 9px 10px; font-size: 13px; }

            /* 聊天室：左下角 */
            #chat-window { bottom: 0; left: 0; width: 300px; height: 100px; border-radius: 0; border-left: none; border-bottom: none; }

            /* 搖桿與行動按鈕 */
            .mobile-ui { bottom: 108px; padding: 0 18px; }
            .joystick-zone { width: 120px; height: 120px; }
            .joystick-stick { width: 48px; height: 48px; top: 36px; left: 36px; }
            .mobile-action-buttons { gap: 8px; }
            .mobile-action-btn { width: 70px; height: 70px; font-size: 12px; }

            /* 商店視窗 */
            #shop-window { width: 340px; }
            .shop-btn { padding: 7px 12px; font-size: 12px; }
        }

        /* 桌面：隱藏行動按鈕 */
        @media (min-width: 1025px) {
            .mobile-action-buttons { display: none; }
            .joystick-zone { display: none; }
        }
    </style>
</head>
<body>

<div id="game-container"></div>

<div id="sfx-indicator">🎵</div>

<div id="status-window" class="ro-panel">
    <div id="job-title">🧙‍♂️ 冒險者 (Lv.1)</div>
    <div class="bar-group">
        <div class="bar-label"><span>❤️ HP</span><span id="hp-text">100/100</span></div>
        <div class="ro-bar"><div id="hp-fill" class="ro-bar-fill ro-hp-fill" style="width:100%"></div></div>
    </div>
    <div class="bar-group">
        <div class="bar-label"><span>💧 SP</span><span id="sp-text">40/40</span></div>
        <div class="ro-bar"><div id="sp-fill" class="ro-bar-fill ro-sp-fill" style="width:100%"></div></div>
    </div>
    <div class="bar-group">
        <div class="bar-label"><span>✨ EXP</span><span id="exp-text">0%</span></div>
        <div class="ro-bar"><div id="exp-fill" class="ro-bar-fill ro-exp-fill"></div></div>
    </div>
    <div class="zeny-row">💰 Zeny: <span id="zeny-text">500</span> z</div>
</div>

<div id="stat-window" class="ro-panel">
    <div class="ro-panel-title">📊 素質 (Status)</div>
    <div style="font-size:11px; margin-bottom:4px;">剩餘點數: <span id="stat-pts" style="color:#c0392b; font-weight:bold;">5</span></div>
    <div class="stat-row"><span>💪 STR: <b id="p-str">5</b></span><button class="stat-btn" onclick="addStat('str')">+</button></div>
    <div class="stat-row"><span>⚡ AGI: <b id="p-agi">5</b></span><button class="stat-btn" onclick="addStat('agi')">+</button></div>
    <div class="stat-row"><span>🛡️ VIT: <b id="p-vit">5</b></span><button class="stat-btn" onclick="addStat('vit')">+</button></div>
</div>

<div id="inventory-window" class="ro-panel">
    <div class="ro-panel-title">🎒 背包 (Bag)</div>
    <div class="inv-slot"><span>⚔️ 武器:</span><span id="eq-weapon" style="color:#c0392b; font-weight:bold;">🪵 幼木棒</span></div>
    <div class="inv-slot"><span>💎 結晶:</span><span id="inv-loot" style="color:#7d3c98;">結晶 x0</span></div>
    <div class="inv-slot"><span>❤️ 紅水:</span><span><b id="inv-red-pot">x0</b> <button class="use-btn use-btn-red" onclick="useRedPotion()">使用</button></span></div>
    <div class="inv-slot"><span>💧 藍水:</span><span><b id="inv-blue-pot">x0</b> <button class="use-btn use-btn-blue" onclick="useBluePotion()">使用</button></span></div>
</div>

<div id="save-window" class="ro-panel">
    <div class="ro-panel-title">💾 儲存 (Save)</div>
    <button class="save-btn" onclick="exportLocalSave()">📥 匯出存檔 (.json)</button>
    <button class="save-btn" onclick="document.getElementById('import-file').click()">📂 匯入存檔</button>
    <input type="file" id="import-file" accept=".json" style="display:none;" onchange="importLocalSave(event)">
    <div style="border-top: 1px dashed #5b7da3; margin: 5px 0;"></div>
    <button class="save-btn gdrive" id="gdrive-login-btn" onclick="handleAuthClick()">🔗 登入 Google</button>
    <button class="save-btn gdrive" id="gdrive-save-btn" onclick="uploadToDrive()" style="display:none;">☁️ 存至雲端</button>
    <button class="save-btn gdrive" id="gdrive-load-btn" onclick="loadFromDrive()" style="display:none;">🔄 從雲端載入</button>
</div>

<div id="shop-window" class="ro-panel">
    <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #4a6d96; padding-bottom: 6px; margin-bottom: 8px;">
        <span id="shop-title" style="font-weight: bold; font-size: 15px;">🏪 互動商店</span>
        <button onclick="closeShop()" class="shop-close-btn">✕ 關閉</button>
    </div>
    <div id="shop-content"></div>
</div>

<div id="skill-window" class="ro-panel">
    <div class="ro-panel-title">⚔️ 特技欄 (Skills)</div>
    <div class="skill-btn" onclick="triggerBashSkill()">
        <span>⚡ 狂擊</span>
        <span class="skill-sp-cost">15 SP</span>
    </div>
</div>

<div id="chat-window" class="ro-panel">
    <div id="chat-log"></div>
    <input type="text" id="chat-input" placeholder="輸入聊天訊息..." onkeydown="sendPlayerChat(event)">
</div>

<div class="mobile-ui">
    <div class="joystick-zone" id="joystick"><div class="joystick-stick" id="stick"></div></div>
    <div class="mobile-action-buttons">
        <button class="mobile-action-btn btn-skill" onclick="triggerBashSkill()">⚡<br>狂擊</button>
        <button class="mobile-action-btn btn-hp-pot" onclick="useRedPotion()">❤️<br>紅水</button>
        <button class="mobile-action-btn btn-sp-pot" onclick="useBluePotion()">💧<br>藍水</button>
    </div>
</div>

<script>
    // ======================= Google API 設定資訊 =======================
    const CLIENT_ID = '375971288943-097rhbub5h2d06f1g5lqs60in6pofj22.apps.googleusercontent.com';
    const SCOPES = 'https://www.googleapis.com/auth/drive';
    const SAVE_FILE_NAME = 'ro_market_save.json';
    
    let tokenClient;
    let accessToken = null;

    const config = {
        type: Phaser.AUTO,
        width: window.innerWidth,
        height: window.innerHeight,
        parent: 'game-container',
        physics: { default: 'arcade', arcade: { y: 0 } },
        scene: { preload: preload, create: create, update: update }
    };

    const game = new Phaser.Game(config);
    let player, playerOutfit;
    
    // 擴充包含貨幣（Zeny）與藥水儲備的資料結構
    let playerData = {
        level: 1, exp: 0, nextExp: 100,
        hp: 100, maxHp: 100,
        sp: 40, maxSp: 40,
        str: 5, agi: 5, vit: 5, points: 5,
        baseAtk: 10, bonusAtk: 0, 
        lootCount: 0, bluePotions: 2, zeny: 500,
        lastAttackTime: 0,
        weaponText: "🪵 幼木棒", // 新增追蹤武器文字以便存檔
        get attackCooldown() { return Math.max(250, 1000 - (this.agi * 45)); }
    };

    let targetPointer = null, monsters, cursors, aiPlayers = [], npcs;
    let joystickDelta = { x: 0, y: 0 }, isJoystickActive = false;

    function preload() {}

    function create() {
        const scene = this;
        scene.physics.world.setBounds(0, 0, 2000, 2000);

        // 1. 純綠色大地底層
        scene.add.rectangle(1000, 1000, 2000, 2000, 0x3e7e43);

        // --- 2. 劃分城鎮安全區 (左上角) ---
        const townZone = scene.add.graphics();
        townZone.fillStyle(0x7f8c8d, 0.3); // 鋪設城鎮輕微地磚感
        townZone.fillRect(0, 0, 400, 400);
        scene.add.text(20, 20, "⛲ 普隆德拉邊境小鎮 (安全區)", { font: "bold 16px Arial", fill: "#fff", backgroundColor: "rgba(0,0,0,0.5)", padding: 4 });

        // 散落一些野外樹木 (避開城鎮)
        for(let i=0; i<15; i++) {
            let tx = Phaser.Math.Between(450, 1950);
            let ty = Phaser.Math.Between(450, 1950);
            scene.add.text(tx, ty, "🌳", { font: "30px Arial" }).setAlpha(0.6);
        }

        // --- 3. 配置 NPC 買賣商家（設置物理靜態體，具備點擊與鄰近提示） ---
        npcs = scene.physics.add.staticGroup();

        // 武器商人
        const weaponNpc = scene.add.container(150, 180);
        weaponNpc.add(scene.add.text(-20, -20, "⚔️", { font: "36px Arial" }));
        weaponNpc.add(scene.add.text(-35, 20, "武器商人", { font: "bold 12px Arial", fill: "#f1c40f", backgroundColor: "#000" }));
        scene.physics.world.enable(weaponNpc, Phaser.Physics.Arcade.STATIC_BODY);
        weaponNpc.body.setSize(50, 50);
        weaponNpc.setData('type', 'weapon');
        npcs.add(weaponNpc);

        // 道具商人
        const itemNpc = scene.add.container(280, 180);
        itemNpc.add(scene.add.text(-20, -20, "🧪", { font: "36px Arial" }));
        itemNpc.add(scene.add.text(-35, 20, "道具商人", { font: "bold 12px Arial", fill: "#2ecc71", backgroundColor: "#000" }));
        scene.physics.world.enable(itemNpc, Phaser.Physics.Arcade.STATIC_BODY);
        itemNpc.body.setSize(50, 50);
        itemNpc.setData('type', 'item');
        npcs.add(itemNpc);

        // --- 4. 玩家初始化 ---
        const playerText = scene.add.text(-20, -20, "🧍", { font: "40px Arial" });
        playerOutfit = scene.add.text(-25, -45, "🧙‍♂️", { font: "28px Arial" });
        player = scene.add.container(200, 300, [playerText, playerOutfit]); // 出生在城鎮安全區
        scene.physics.world.enable(player);
        player.body.setCollideWorldBounds(true).setSize(45,45);

        // 阻擋玩家與 NPC 重疊穿透
        scene.physics.add.collider(player, npcs, handleNpcInteract, null, this);

        scene.cameras.main.setBounds(0, 0, 2000, 2000).startFollow(player, true, 0.1, 0.1);

        // 生成野外怪物
        monsters = scene.physics.add.group();
        for(let i=0; i<15; i++) spawnMonster(scene);

        cursors = scene.input.keyboard.createCursorKeys();
        scene.input.on('pointerdown', (pointer) => {
            if (pointer.button === 0 && !isJoystickActive && pointer.y > 150 && pointer.x < window.innerWidth - 180) {
                targetPointer = scene.cameras.main.getWorldPoint(pointer.x, pointer.y);
            }
        });

        // 自動自然回魔計時器
        scene.time.addEvent({
            delay: 3000, loop: true,
            callback: () => {
                if (playerData.hp > 0) {
                    playerData.sp = Math.min(playerData.maxSp, playerData.sp + 5);
                    updateUI();
                }
            }
        });

        setupJoystick();
        updateUI();
        logChat("系統", "歡迎來到普隆德拉邊境！走到 NPC 商人身邊即可開啟買賣介面。");
        initPuterAIPlayers(scene);
        
        // 初始化 Google API 機制
        gapiLoaded();
        gisLoaded();
    }

    function update(time) {
        const speed = 210;
        let vx = 0, vy = 0;

        if (cursors.left.isDown) vx = -speed;
        else if (cursors.right.isDown) vx = speed;
        if (cursors.up.isDown) vy = -speed;
        else if (cursors.down.isDown) vy = speed;

        if (vx === 0 && vy === 0 && (joystickDelta.x !== 0 || joystickDelta.y !== 0)) {
            vx = joystickDelta.x * speed; vy = joystickDelta.y * speed; targetPointer = null;
        }

        if (vx === 0 && vy === 0 && targetPointer) {
            const distance = Phaser.Math.Distance.Between(player.x, player.y, targetPointer.x, targetPointer.y);
            if (distance > 12) {
                this.physics.moveTo(player, targetPointer.x, targetPointer.y, speed);
            } else { player.body.setVelocity(0); targetPointer = null; }
        } else { player.body.setVelocity(vx, vy); }

        // 戰鬥常規檢索 (城鎮外有效)
        monsters.getChildren().forEach(monster => {
            if (!monster.active) return;
            if (Phaser.Math.Distance.Between(player.x, player.y, monster.x, monster.y) < 65) {
                handleBattleLoop(this, player, playerData, monster, time, true);
            }
        });
    }

        playerData.zeny -= cost;

            logChat("商店", "🛍️ 成功購買並裝備了神兵 [燕尖矛]！");

            playerData.bluePotions++;

            return;
        }
        const gain = playerData.lootCount * 15;

        logChat("商店", `💰 變賣了 ${playerData.lootCount} 個結晶，獲得了 ${gain} Zeny！`);

    // --- 背包道具主動使用機制 ---
    function useBluePotion() {
        if(playerData.bluePotions <= 0) {
            logChat("背包", "❌ 背包裡沒有藍色藥水了！");
            return;
        }
        if(playerData.sp >= playerData.maxSp) {

            return;
        }

        playerData.sp = Math.min(playerData.maxSp, playerData.sp + 25);

    }

    // --- 經典戰鬥與狂擊特技系統 ---
    function handleBattleLoop(scene, attacker, attData, monster, currentTime, isPlayer) {
        if (currentTime - attData.lastAttackTime > attData.attackCooldown) {
            attData.lastAttackTime = currentTime;
            const dmg = Phaser.Math.Between(attData.baseAtk + attData.str - 2, attData.baseAtk + attData.str + 3) + (isPlayer ? playerData.bonusAtk : 0);
            monster.hp -= dmg;
            monster.hpText.setText(`HP: ${monster.hp > 0 ? monster.hp : 0}`);
            showPopText(scene, monster.x, monster.y - 20, dmg, "#f1c40f");

            if (monster.hp > 0) {
                const monsterDmg = Phaser.Math.Between(4, 8);
                playerData.hp = Math.max(0, playerData.hp - monsterDmg);
                updateUI();
                showPopText(scene, player.x, player.y - 20, monsterDmg, "#e74c3c");
                
                if(playerData.hp <= 0) {
                    player.setPosition(200, 300); // 死亡直接回城鎮安全區
                    playerData.hp = playerData.maxHp;
                    logChat("系統", "💀 不幸力竭，已被緊急送回普隆德拉安全區。");
                    updateUI();
                }
            }

            if (monster.hp <= 0) {
                monster.destroy();
                logChat("系統", `擊敗了 ${monster.monsterName}！`);
                playerData.exp += 35;
                playerData.lootCount++; // 獲得結晶

                if(playerData.exp >= playerData.nextExp) {
                    playerData.level++; playerData.points += 4; playerData.exp = 0;
                    logChat("系統", `🎉 Level Up！晉升至 Lv.${playerData.level}！`);
                }
                updateUI();
                setTimeout(() => spawnMonster(scene), 3000);
            }
        }
    }

    function triggerBashSkill() {
        const scene = game.scene.scenes[0];
        if (playerData.sp < 15) { logChat("特技", "❌ SP 不足，無法施展狂擊！"); return; }

        let targetMonster = null;
        monsters.getChildren().forEach(m => {
            if (Phaser.Math.Distance.Between(player.x, player.y, m.x, m.y) < 90) targetMonster = m;
        });

        if (!targetMonster) { logChat("特技", "⚠️ 周圍沒有可以鎖定的打怪目標。"); return; }

        playerData.sp -= 15;
        const electro = scene.add.text(targetMonster.x - 10, targetMonster.y - 30, "⚡⚡", { font: "45px Arial" });
        scene.tweens.add({ targets: electro, scale: 1.6, alpha: 0, duration: 300, onComplete: () => electro.destroy() });

        const skillDmg = Math.floor((playerData.baseAtk + playerData.str + playerData.bonusAtk) * 2.5);
        targetMonster.hp -= skillDmg;
        targetMonster.hpText.setText(`HP: ${targetMonster.hp > 0 ? targetMonster.hp : 0}`);
        showPopText(scene, targetMonster.x, targetMonster.y - 30, `💥 ${skillDmg}`, "#3498db");
        logChat("特技", `⚔️ 施展【狂擊】重創 ${targetMonster.monsterName} 造成 ${skillDmg} 點傷害！`);

        if (targetMonster.hp <= 0) {
            targetMonster.destroy(); playerData.exp += 35; playerData.lootCount++;
            updateUI();
            setTimeout(() => spawnMonster(scene), 3000);
        }
        updateUI();
    }

    async function initPuterAIPlayers(scene) {
        const names = ["路人天賜", "愛配利雅"];
        for (let i = 0; i < names.length; i++) {
            const body = scene.add.text(-20, -20, "🧍", { font: "40px Arial" });
            const hat = scene.add.text(-25, -45, "🤠", { font: "26px Arial" });
            const nameTag = scene.add.text(-30, 22, names[i], { font: "11px Arial", fill: "#fff", backgroundColor: "#5b7da3" });
            const bubble = scene.add.text(-40, -75, "", { font: "12px Arial", fill: "#000", backgroundColor: "#fff", padding: 3 });
            bubble.setAlpha(0);

            const ai = scene.add.container(Phaser.Math.Between(100, 300), Phaser.Math.Between(250, 350), [body, hat, nameTag, bubble]);
            scene.physics.world.enable(ai);
            ai.name = names[i]; ai.bubble = bubble;
            ai.targetX = Phaser.Math.Between(80, 350);
            ai.targetY = Phaser.Math.Between(80, 370);
            aiPlayers.push(ai);

            // 行走移動迴圈：每秒更新速度朝向目標點
            scene.time.addEvent({
                delay: 800, loop: true,
                callback: () => {
                    if (!ai.active) return;
                    const dist = Phaser.Math.Distance.Between(ai.x, ai.y, ai.targetX, ai.targetY);
                    if (dist < 20) {
                        // 到達目標後隨機選下一個目標（在城鎮或略外範圍）
                        ai.targetX = Phaser.Math.Between(60, 400);
                        ai.targetY = Phaser.Math.Between(60, 400);
                    }
                    const angle = Phaser.Math.Angle.Between(ai.x, ai.y, ai.targetX, ai.targetY);
                    const spd = 70;
                    ai.body.setVelocity(Math.cos(angle) * spd, Math.sin(angle) * spd);
                }
            });

            // 定期與 Puter AI 請求新對白（每 12 秒）
            const aiChatLoop = async () => {
                try {
                    const response = await puter.ai.chat(`你是RO城鎮玩家 ${names[i]}。請用一句話(12字內)說你正在城鎮閒逛的心情或計劃。`);
                    const msg = response.toString().trim();
                    logChat(names[i], msg);
                    bubble.setText(msg).setAlpha(1);
                    scene.time.delayedCall(5000, () => bubble.setAlpha(0));
                } catch(e) {}
                scene.time.delayedCall(12000, aiChatLoop);
            };

            // 啟動時說第一句話
            try {
                const response = await puter.ai.chat(`你是RO城鎮玩家 ${names[i]}。請用一句話(15字內)說自己要去跟商人買裝備、或者去變賣結晶。`);
                const msg = response.toString().trim();
                logChat(names[i], msg);
                bubble.setText(msg).setAlpha(1);
                scene.time.delayedCall(5000, () => bubble.setAlpha(0));
            } catch(e) {}

            // 延遲 12 秒後開始循環對白
            scene.time.delayedCall(12000 + i * 4000, aiChatLoop);
        }
    }

    function setupJoystick() {
        const joystick = document.getElementById('joystick');
        const stick = document.getElementById('stick');
        joystick.addEventListener('touchstart', () => isJoystickActive = true);
        joystick.addEventListener('touchmove', (e) => {
            const rect = joystick.getBoundingClientRect();
            let x = e.touches[0].clientX - (rect.left + 45);
            let y = e.touches[0].clientY - (rect.top + 45);
            const dist = Math.sqrt(x*x + y*y);
            if(dist > 25) { x=(x/dist)*25; y=(y/dist)*25; }
            stick.style.transform = `translate(${x}px, ${y}px)`;
            joystickDelta = { x: x/25, y: y/25 };
        });
        joystick.addEventListener('touchend', () => {
            isJoystickActive = false; stick.style.transform = 'translate(0px,0px)'; joystickDelta = {x:0, y:0};
        });
    }

    // 💾 全新核心系統：本地與雲端存檔引擎機制

    // 1. 產生乾淨的可序列化存檔資料
    function generateSavePackage() {
        return {
            level: playerData.level,
            exp: playerData.exp,
            nextExp: playerData.nextExp,
            hp: playerData.hp,
            maxHp: playerData.maxHp,
            sp: playerData.sp,
            maxSp: playerData.maxSp,
            str: playerData.str,
            agi: playerData.agi,
            vit: playerData.vit,
            points: playerData.points,
            baseAtk: playerData.baseAtk,
            bonusAtk: playerData.bonusAtk,
            lootCount: playerData.lootCount,
            bluePotions: playerData.bluePotions,
            zeny: playerData.zeny,
            weaponText: playerData.weaponText,
            savedAt: new Date().toISOString()
        };
    }

    // 2. 將讀取的檔案內容還原至遊戲數據中
    function applySavePackage(data) {
        try {
            if (!data.level || !data.zeny) throw new Error("無效的存檔欄位格式");
            
            playerData.level = data.level;
            playerData.exp = data.exp;
            playerData.nextExp = data.nextExp;
            playerData.hp = data.hp;
            playerData.maxHp = data.maxHp;
            playerData.sp = data.sp;
            playerData.maxSp = data.maxSp;
            playerData.str = data.str;
            playerData.agi = data.agi;
            playerData.vit = data.vit;
            playerData.points = data.points;
            playerData.baseAtk = data.baseAtk;
            playerData.bonusAtk = data.bonusAtk;
            playerData.lootCount = data.lootCount;
            playerData.bluePotions = data.bluePotions;
            playerData.zeny = data.zeny;
            playerData.weaponText = data.weaponText || "🪵 幼木棒";
            
            updateUI();
            logChat("系統", `💾 存檔載入成功！目前等級: Lv.${playerData.level}`);
            return true;
        } catch (e) {
            logChat("系統", "❌ 存檔格式毀損，無法載入。");
            return false;
        }
    }

    // --- 本地端存檔演算法 ---
    function exportLocalSave() {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(generateSavePackage(), null, 2));
        const downloadAnchor = document.createElement('a');
        downloadAnchor.setAttribute("href", dataStr);
        downloadAnchor.setAttribute("download", SAVE_FILE_NAME);
        document.body.appendChild(downloadAnchor);
        downloadAnchor.click();
        downloadAnchor.remove();
        logChat("系統", "📥 成功匯出本地端 json 存檔檔案。");
    }

    function importLocalSave(event) {
        const input = event.target;
        if (!input.files || input.files.length === 0) return;
        
        const file = input.files[0];
        const reader = new FileReader();
        reader.onload = function() {
            try {
                const parsedData = JSON.parse(reader.result);
                applySavePackage(parsedData);
            } catch(e) {
                logChat("系統", "❌ 讀取本地檔案失敗，請確保這是正確的 JSON 格式。");
            }
        };
        reader.readAsText(file);
        input.value = ""; // 清空選擇狀態以利下次觸發
    }

    // --- Google Drive 雲端同步架構 ---
    function gapiLoaded() {
        gapi.load('client', initializeGapiClient);
    }

    async function initializeGapiClient() {
        await gapi.client.init({});
    }

    function gisLoaded() {
        tokenClient = google.accounts.oauth2.initTokenClient({
            client_id: CLIENT_ID,
            scope: SCOPES,
            callback: (resp) => {
                if (resp.error !== undefined) {
                    logChat("Google", "❌ 授權失敗: " + resp.error);
                    return;
                }
                accessToken = resp.access_token;
                logChat("Google", "🟢 授權成功！已成功連結至 Google Drive。");
                // 變更 UI 按鈕狀態
                document.getElementById('gdrive-login-btn').style.display = 'none';
                document.getElementById('gdrive-save-btn').style.display = 'block';
                document.getElementById('gdrive-load-btn').style.display = 'block';
            },
        });
    }

    function handleAuthClick() {
        if (accessToken === null) {
            tokenClient.requestAccessToken({prompt: 'consent'});
        } else {
            tokenClient.requestAccessToken({prompt: ''});
        }
    }

    // 尋找雲端中是否已存在同名的存檔檔案
    async function findSaveFileOnDrive() {
        const response = await fetch(`https://www.googleapis.com/drive/v3/files?q=name='${SAVE_FILE_NAME}' and trashed=false`, {
            method: 'GET',
            headers: { 'Authorization': `Bearer ${accessToken}` }
        });
        const result = await response.json();
        if (result.files && result.files.length > 0) {
            return result.files[0].id; // 回傳檔案 ID
        }
        return null;
    }

    // 核心：上傳或更新至雲端
    async function uploadToDrive() {
        if (!accessToken) {
            logChat("Google", "❌ 請先登入 Google 帳號。");
            return;
        }
        logChat("Google", "⏳ 正在同步進度至雲端硬碟...");
        
        try {
            const fileId = await findSaveFileOnDrive();
            const saveContent = JSON.stringify(generateSavePackage(), null, 2);
            
            let url = 'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart';
            let method = 'POST';
            
            const metadata = { name: SAVE_FILE_NAME, mimeType: 'application/json' };
            
            if (fileId) {
                // 如果檔案存在，切換為更新（Update）模式
                url = `https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=multipart`;
                method = 'PATCH';
            }

            const boundary = 'foo_bar_baz';
            const delimiter = `\r\n--${boundary}\r\n`;
            const closeDelimiter = `\r\n--${boundary}--`;
            
            const multipartRequestBody =
                delimiter +
                'Content-Type: application/json; charset=UTF-8\r\n\r\n' +
                JSON.stringify(metadata) +
                delimiter +
                'Content-Type: application/json\r\n\r\n' +
                saveContent +
                closeDelimiter;

            const response = await fetch(url, {
                method: method,
                headers: {
                    'Authorization': `Bearer ${accessToken}`,
                    'Content-Type': `multipart/related; boundary=${boundary}`
                },
                body: multipartRequestBody
            });

            if (response.ok) {
                logChat("Google", "☁️ 雲端同步完畢！進度已成功儲存。");
            } else {
                throw new Error("伺服器回應異常");
            }
        } catch (error) {
            console.error(error);
            logChat("Google", "❌ 雲端儲存失敗，請檢查網路連線或權限設定。");
        }
    }

    // 核心：自雲端下載並覆蓋進度
    async function loadFromDrive() {
        if (!accessToken) {
            logChat("Google", "❌ 請先登入 Google 帳號。");
            return;
        }
        logChat("Google", "⏳ 正在自雲端請求數據庫...");

        try {
            const fileId = await findSaveFileOnDrive();
            if (!fileId) {
                logChat("Google", "⚠️ 雲端硬碟上找不到任何相關的遊戲存檔。");
                return;
            }

            const response = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, {
                method: 'GET',
                headers: { 'Authorization': `Bearer ${accessToken}` }
            });

            if (response.ok) {
                const cloudData = await response.json();
                applySavePackage(cloudData);
            } else {
                throw new Error("無法取得檔案內容");
            }
        } catch (error) {
            console.error(error);
            logChat("Google", "❌ 自雲端讀取資料失敗。");
        }
    }
</script>
